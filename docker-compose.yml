services:
  yaml-editor:
    image: ghcr.io/eagleffz/yaml-editor:latest
    ports:
      - "3000:3000"
    environment:
      APP_USERNAME: admin
      APP_PASSWORD: change-me
      SESSION_SECRET: change-this-local-secret
      DATA_DIR: /data
      MAX_FILE_BYTES: 1048576
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data:/data
    restart: unless-stopped
